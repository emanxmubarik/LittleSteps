<!DOCTYPE html> 
<html lang="en"> 
<head> 
  <meta charset="UTF-8" /> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/> 
  <title>madebyeman</title> 

  <!-- Fonts --> 
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"> 

  <style> 
    :root{ 
      --ink:#000000; 
      --muted:#556555; 
      --white:#ffffff; 
      --red:#e60000; 
      --accent:#ffcc00; 
      --shadow:0 18px 40px rgba(0, 0, 0, .12); 
    }
    header{ 
      position: sticky; top:0; z-index:20; 
      background:rgba(255,255,255,.9); 
      backdrop-filter: blur(8px); 
      border-bottom:1px solid var(--red); 
      padding: .9rem 1.25rem; 
    } 
    .nav{ 
      max-width:1100px; margin:0 auto; 
      display:flex; align-items:center; justify-content:space-between; 
    } 
    .brand{ 
      font-weight:800; font-size:1.3rem; letter-spacing:.5px; 
      color: var(--red);
    } 
    nav a{ 
      text-decoration:none; font-weight:700; color:var(--ink); 
      padding:.5rem .8rem; border-radius:10px; 
      transition: all .2s ease; 
    } 
    nav a:hover{ 
      background: var(--red); 
      color: var(--white); 
      box-shadow: 0 6px 14px rgba(0, 0, 0, .08); 
    } 

    main{ 
      max-width:900px; 
      margin: 3rem auto; 
      padding: 0 1.25rem; 
    } 

    .title{ 
      text-align: center; 
      font-family:'Playfair Display', serif; 
      font-size: clamp(2rem, 4.5vw, 3rem); 
      line-height:1.1; 
      margin:.1rem 0 .75rem; 
      color: var(--ink);
    } 

    .tile{ 
      background: var(--white); 
      border:1px solid #ccc; 
      border-radius:16px; 
      padding:1.2rem 1.25rem; 
      display:flex; 
      align-items:center; 
      justify-content:space-between; 
      gap:1rem; 
      box-shadow: 0 12px 26px rgba(0, 0, 0, .08); 
      text-decoration:none; 
      color:inherit; 
      transition: transform .08s ease, box-shadow .2s ease; 
    } 

    .lead { 
      text-align: center; 
    } 

    footer{ 
      margin-top:3rem; 
      background: rgba(255,255,255,.9); 
      backdrop-filter: blur(6px); 
      border-top:1px solid var(--red); 
      text-align:center; 
      color: var(--muted); 
      font-size:.95rem; 
      padding:1rem; 
    } 
  </style> 
</head> 
<body> 

  <header> 
    <div class="nav"> 
      <div class="brand">Little Steps</div> 
      <nav> 
        <a href="index.html">Home</a> 
        <a href="about.html">About Us</a> 
        <a href="involve.html">Get Involved</a> 
        <a href="blog.html">Blog</a> 
        <a href="contact.html">Contact Us</a>
      </nav> 
    </div> 
  </header> 

  <main> 
    <h1 class="title">Welcome to Little Steps</h1>
    <!-- Content will go here -->
  </main> 

  <footer> 
    &copy; Little Steps — All rights reserved. 
  </footer> 

</body> 
</html>
